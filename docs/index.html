<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vegeterian - Static Tools</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>

<body>
    <div class="container py-4">
        <h1 class="mb-3">Vegeterian</h1>

        <div class="row mb-3">
            <div class="col-12">
                <ul class="nav nav-tabs" id="appTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="tab-upload" type="button" role="tab">Upload</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="tab-search" type="button" role="tab">Search</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="tab-toggle" type="button" role="tab">Toggle List</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="tab-leftovers" type="button" role="tab">Leftovers Text</button>
                    </li>
                </ul>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="tab-content">
                    <div id="uploadTabPane" class="tab-pane fade show active" role="tabpanel">
                        <div class="card mb-3">
                            <div class="card-body">
                                <h5>Upload Orders (Excel)</h5>
                                <input id="ordersFile" type="file" accept=".xlsx,.xls" class="form-control mb-2">
                                <button id="clearLogsBtn" class="btn btn-secondary ms-2" style="display:none;">Clear
                                    Logs</button>
                            </div>
                        </div>
                        <div class="card">
                            <div class="card-header bg-light">
                                <h6 class="mb-0">Upload Log</h6>
                            </div>
                            <div id="uploadLog" class="card-body"
                                style="max-height: 300px; overflow-y: auto; background-color: #f8f9fa; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; word-break: break-word;">
                                <span class="text-muted">Logs will appear here...</span>
                            </div>
                        </div>
                    </div>

                    <div id="searchTabPane" class="tab-pane fade" role="tabpanel">
                        <div class="row">
                            <div class="col-md-4">
                                <div class="card mb-3">
                                    <div class="card-body">
                                        <h5>Search</h5>
                                        <label class="form-label">Enter one or more name fragments (one per
                                            line)</label>
                                        <textarea id="searchNames" class="form-control mb-2" rows="5"
                                            placeholder="One name fragment per line">וולדמן
אברמוביץ
מובשוביץ
סידו
פרון
ספיר לוי</textarea>
                                        <div class="d-flex gap-2">
                                            <button id="searchBtn" class="btn btn-primary btn-sm">Search</button>
                                            <button id="searchBackBtn" class="btn btn-outline-secondary btn-sm">Back to
                                                Toggle List</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-8">
                                <div id="searchResultsPane" class="pane d-none">
                                    <h3>Search Results</h3>
                                    <div id="searchResults"></div>
                                </div>
                                <div id="textPane" class="pane d-none">
                                    <h3>Generated Texts</h3>
                                    <div id="textsList"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="toggleTabPane" class="tab-pane fade" role="tabpanel">
                        <div id="leftoversPane" class="pane">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h1 class="mb-0">Ariel - Leftovers</h1>
                                <div class="ariel-actions">
                                    <button id="submitLeftovers" class="btn btn-primary ariel-submit">Submit</button>
                                    <button id="setAllUnavailable" class="btn btn-warning ms-2">Set All
                                        Unavailable</button>
                                    <button id="setAllAvailable" class="btn btn-success ms-2">Set All Available</button>
                                    <button id="setAllKgAvailable" class="btn btn-info ms-2">Set All KG
                                        Available</button>
                                </div>
                            </div>
                            <div id="leftoversList"></div>
                        </div>
                    </div>

                    <div id="leftoversTextTabPane" class="tab-pane fade" role="tabpanel">
                        <div id="leftoversResultPane" class="pane">
                            <h3>Items Leftovers Prices</h3>
                            <div class="mb-3 d-flex">
                                <button id="backToAriel" class="btn btn-success ms-2">עדכון עודפים</button>
                                <button id="copyLeftoversBtn" class="btn btn-outline-primary ms-2">Copy & Go</button>
                            </div>
                            <textarea id="leftoversTextarea" class="form-control ariel-text" rows="20"
                                style="direction: rtl; text-align: right;"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-4 small text-muted">This static UI parses files in your browser — no server required. See <a
                href="README_UI.md">docs</a>.</footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
