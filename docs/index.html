<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vegeterian - Static Tools</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
  <h1 class="mb-3">Vegeterian - Static UI Tools</h1>

  <div class="row">
    <div class="col-md-4">
      <div class="card mb-3">
        <div class="card-body">
          <h5>Upload Orders (Excel)</h5>
          <input id="ordersFile" type="file" accept=".xlsx,.xls" class="form-control mb-2">
          <button id="parseOrdersBtn" class="btn btn-primary btn-sm">Parse Orders</button>
        </div>
      </div>

      <div class="card mb-3">
        <div class="card-body">
          <h5>Upload Customers (CSV)</h5>
          <input id="customersFile" type="file" accept=".csv" class="form-control mb-2">
          <button id="parseCustomersBtn" class="btn btn-secondary btn-sm">Parse Customers</button>
        </div>
      </div>

      <div class="card mb-3">
        <div class="card-body">
          <h5>Search</h5>
          <input id="searchName" class="form-control mb-2" placeholder="Search customer name...">
          <button id="searchBtn" class="btn btn-outline-primary btn-sm">Search Orders</button>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <h5>Actions</h5>
          <button id="gotoLeftovers" class="btn btn-success btn-sm">Go to Leftovers</button>
          <button id="gotoText" class="btn btn-success btn-sm">Go to Text Page</button>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <div id="mainPane">
        <div id="leftoversPane" class="pane">
          <h3>Leftovers / Parsed Orders</h3>
          <div id="leftoversList"></div>
        </div>

        <div id="textPane" class="pane d-none">
          <h3>Generated Texts</h3>
          <div id="textsList"></div>
        </div>

        <div id="searchResultsPane" class="pane d-none">
          <h3>Search Results</h3>
          <div id="searchResults"></div>
        </div>
      </div>
    </div>
  </div>

  <footer class="mt-4 small text-muted">This static UI parses files in your browser — no server required. See <a href="README_UI.md">docs</a>.</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="app.js"></script>
</body>
</html>
