<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vegeterian - Static Tools</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>

<body>
    <div class="container py-4">
        <h1 class="mb-3">Vegeterian - Static UI Tools</h1>

        <div class="row">
            <div class="col-md-4">
                <div class="card mb-3">
                    <div class="card-body">
                        <h5>Upload Orders (Excel)</h5>
                        <input id="ordersFile" type="file" accept=".xlsx,.xls" class="form-control mb-2">
                    </div>
                </div>

                <!-- Customers CSV upload removed (not needed) -->

                <div class="card mb-3">
                    <div class="card-body">
                        <h5>Search</h5>
                        <label class="form-label">Enter one or more name fragments (one per line)</label>
                        <textarea id="searchNames" class="form-control mb-2" rows="5"
                            placeholder="One name fragment per line"></textarea>
                        <div class="d-flex gap-2">
                            <button id="searchBtn" class="btn btn-primary btn-sm">Search</button>
                            <button id="searchBackBtn" class="btn btn-outline-secondary btn-sm">Back to
                                Leftovers</button>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <h5>Actions</h5>
                        <button id="gotoLeftovers" class="btn btn-success btn-sm">Go to Leftovers</button>
                        <button id="gotoText" class="btn btn-success btn-sm">Go to Text Page</button>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div id="mainPane">
                    <div id="leftoversPane" class="pane">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h1 class="mb-0">Ariel - Leftovers</h1>
                            <div class="ariel-actions">
                                <button id="submitLeftovers" class="btn btn-primary ariel-submit">Submit</button>
                                <button id="setAllUnavailable" class="btn btn-warning ms-2">Set All Unavailable</button>
                                <button id="setAllAvailable" class="btn btn-success ms-2">Set All Available</button>
                                <button id="setAllKgAvailable" class="btn btn-info ms-2">Set All KG Available</button>
                            </div>
                        </div>
                        <div id="leftoversList"></div>
                    </div>

                    <div id="leftoversResultPane" class="pane d-none">
                        <h3>Items Leftovers Prices</h3>
                        <div class="mb-3 d-flex">
                            <button id="downloadWord" class="btn btn-primary">Download Word</button>
                            <button id="backToAriel" class="btn btn-success ms-2">עדכון עודפים</button>
                            <button id="copyLeftoversBtn" class="btn btn-outline-primary ms-2">Copy & Go</button>
                        </div>
                        <textarea id="leftoversTextarea" class="form-control ariel-text" rows="20"
                            style="direction: rtl; text-align: right;"></textarea>
                    </div>

                    <div id="textPane" class="pane d-none">
                        <h3>Generated Texts</h3>
                        <div id="textsList"></div>
                    </div>

                    <div id="searchResultsPane" class="pane d-none">
                        <h3>Search Results</h3>
                        <div id="searchResults"></div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-4 small text-muted">This static UI parses files in your browser — no server required. See <a
                href="README_UI.md">docs</a>.</footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
